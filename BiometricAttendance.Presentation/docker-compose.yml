services:

  api:
    build:
      context: ..
      dockerfile: BiometricAttendance.Presentation/Dockerfile
    container_name: biometric-attendance-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=BiometricAttendanceDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
      - JWT__Key=${JWT_KEY}
      - JWT__Issuer=BiometricAttendance
      - JWT__Audience=BiometricAttendanceUsers
      - JWT__ExpiryMinutes=60
      - JWT__RefreshTokenExpiryDays=7
      - SerialPort__PortName=${SERIAL_PORT:-COM3}
      - SerialPort__BaudRate=${BAUD_RATE:-9600}
      - HangfireConnection=Server=db;Database=BiometricAttendanceHangfire;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: biometric-attendance-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -Q 'SELECT 1' -b"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sqldata:
